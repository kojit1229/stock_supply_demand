    :root {
      color-scheme: dark;
      --bg: #0b1118;
      --surface: #111b26;

      --border: #29394a;
      --text: #eef4f8;
      --muted: #9aabb9;
      --increase: #e85d4a;

      --series-own: #e6b85c;

    body {

      min-height: 100dvh;
      margin: 0;
      background:
        radial-gradient(circle at 90% -10%, rgba(63, 163, 124, .13), transparent 33rem),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", "Yu Gothic", sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    a { color: inherit; }
    button, input { font: inherit; }

    .site-shell {
      display: flex;

      flex-direction: column;
    }

    .header-inner,

      min-height: 64px;
      align-items: center;
      justify-content: space-between;
      gap: 16px;

      color: var(--text);
      font-size: 1.12rem;
      font-weight: 800;
      letter-spacing: .04em;
      text-decoration: none;
    }

    .brand-mark { color: var(--increase); }
    .header-tag { color: var(--muted); font-size: .75rem; }

    main {
      flex: 1;
      padding-block: 24px 48px;
    }

    .freshness {
      display: flex;
      margin-bottom: 18px;
      padding: 10px 14px;
      align-items: center;
      gap: 9px;
      border: 1px solid rgba(63, 163, 124, .35);
      border-radius: 10px;
      background: rgba(63, 163, 124, .09);
      color: #bce4d1;
      font-size: .86rem;
    }

    .freshness::before {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--decrease);
      content: "";
      flex: none;
    }

    .freshness.warning {
      border-color: rgba(240, 179, 76, .5);
      background: rgba(240, 179, 76, .1);
      color: #ffd991;
    }

    .freshness.warning::before { background: var(--warning); }

    h1, h2, p { margin-top: 0; }

    h2 { margin-bottom: 16px; font-size: 1.08rem; }
    .lead { max-width: 42rem; margin-bottom: 0; color: var(--muted); }

    .search-box {
      position: relative;
      margin: 20px 0 12px;
    }

    .search-box::before {
      position: absolute;
      top: 50%;
      left: 17px;
      color: var(--muted);
      content: "⌕";
      font-size: 1.45rem;
      line-height: 1;
      transform: translateY(-53%);
      pointer-events: none;
    }

    #issue-search {

      min-height: 54px;
      padding: 13px 16px 13px 49px;
      border: 1px solid var(--border);
      border-radius: 13px;
      outline: none;
      background: var(--surface);
      color: var(--text);
      font-size: 1rem;
      -webkit-appearance: none;
    }

    #issue-search:focus {

      box-shadow: 0 0 0 3px rgba(63, 163, 124, .18);

    .result-list { display: grid; margin: 0; padding: 0; gap: 8px; list-style: none; }

      border-radius: 11px;
      background: var(--surface);
      text-decoration: none;
      transition: border-color .15s ease, transform .15s ease;

      background: rgba(17, 27, 38, .92);
      box-shadow: 0 14px 40px rgba(0, 0, 0, .16);
